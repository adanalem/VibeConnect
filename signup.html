<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Social Blog</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[#0f0c29] bg-gradient-to-br from-[#0f0c29] via-[#302b63] to-[#24243e] min-h-screen flex items-center justify-center p-6">

    <div class="max-w-4xl w-full flex flex-col md:flex-row glass rounded-3xl overflow-hidden shadow-2xl">
        
        <div class="md:w-1/2 p-12 flex flex-col justify-center bg-gradient-to-tr from-purple-900/40 to-transparent">
            <h1 class="text-4xl font-bold text-white mb-4">Welcome to the Club!</h1>
            <p class="text-purple-200 text-lg">Create an account to start sharing your thoughts and connecting with others.</p>
            <div class="mt-8 flex gap-2">
                <div class="h-1 w-12 bg-pink-500 rounded-full"></div>
                <div class="h-1 w-4 bg-purple-400 rounded-full"></div>
            </div>
        </div>

        <div class="md:w-1/2 p-10 bg-black/20">
            <h2 class="text-2xl font-semibold text-white mb-6">Sign Up</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-purple-300 uppercase tracking-widest">Full Name</label>
                    <input type="text" id="full-name" placeholder="Adan Alam" 
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 text-white focus:outline-none focus:ring-2 focus:ring-pink-500 transition-all">
                </div>

                <div>
                    <label class="text-xs text-purple-300 uppercase tracking-widest">Email Address</label>
                    <input type="email" id="signup-email" placeholder="email@example.com" 
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 text-white focus:outline-none focus:ring-2 focus:ring-pink-500 transition-all">
                </div>

                <div>
                    <label class="text-xs text-purple-300 uppercase tracking-widest">Password</label>
                    <input type="password" id="signup-password" placeholder="••••••••" 
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mt-1 text-white focus:outline-none focus:ring-2 focus:ring-pink-500 transition-all">
                </div>

                <button id="signup-btn" 
                    class="w-full bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold py-3 rounded-xl mt-4 shadow-lg shadow-pink-900/20 transform transition active:scale-95">
                    CREATE ACCOUNT
                </button>

                <p class="text-center text-sm text-purple-300 mt-6">
                    Already have an account? <a href="index.html" class="text-pink-400 font-semibold hover:underline">Login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>

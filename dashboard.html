<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Social Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; transition: all 0.4s ease; }
        /* 3D Glassmorphism Effect */
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .light-mode .glass { 
            background: rgba(255, 255, 255, 0.9); 
            border: 1px solid rgba(0, 0, 0, 0.05); 
            color: #1e293b; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .post-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .post-card:hover { transform: translateY(-5px) scale(1.01); }
    </style>
</head>
<body id="body-bg" class="bg-[#0f0c29] min-h-screen text-white transition-all duration-500">

    <div class="max-w-[1100px] mx-auto grid grid-cols-12 gap-6 p-4 md:p-8">
        
        <aside class="col-span-12 md:col-span-3">
            <div class="glass rounded-[2.5rem] p-6 text-center sticky top-8">
                <div class="relative inline-block group">
                    <label for="image-upload" class="cursor-pointer relative block">
                        <img id="profile-img" src="https://ui-avatars.com/api/?name=User" class="profile-img-sync w-28 h-28 rounded-[2rem] border-4 border-pink-500 object-cover shadow-2xl transition-transform hover:rotate-3">
                        <div class="absolute inset-0 bg-black/40 rounded-[2rem] flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <span class="text-[10px] font-bold">CHANGE</span>
                        </div>
                    </label>
                    <input type="file" id="image-upload" class="hidden" accept="image/*">
                </div>
                
                <h2 id="user-display-name" class="font-black text-xl mt-4 tracking-tight">Loading...</h2>
                <p class="text-[10px] opacity-50 font-bold uppercase tracking-widest mt-1">Verified Member</p>
                
                <div class="mt-8 space-y-3">
                    <button id="theme-toggle" class="w-full py-3 glass rounded-2xl hover:bg-white/10 flex items-center justify-center gap-2 font-bold text-sm transition-all active:scale-95">🌓 Theme</button>
                    <button id="logout-btn" class="w-full py-3 text-red-400 font-bold text-sm hover:bg-red-500/10 rounded-2xl transition-all">Logout</button>
                </div>
            </div>
        </aside>

        <main class="col-span-12 md:col-span-9 space-y-6">
            <div class="glass rounded-[2.5rem] p-6 shadow-2xl border border-white/5">
                <div class="flex gap-4">
                    <img src="" class="profile-img-sync w-12 h-12 rounded-xl bg-pink-500 flex-shrink-0 object-cover shadow-lg">
                    <textarea id="post-content" placeholder="What's on your mind?" class="w-full bg-white/5 border border-white/10 rounded-[1.5rem] p-4 text-white focus:outline-none focus:ring-2 focus:ring-pink-500 transition-all h-28 font-medium"></textarea>
                </div>
                
                <div id="image-preview-container" class="mt-4 hidden relative">
                    <img id="post-image-preview" class="w-full max-h-72 rounded-[2rem] object-cover border-2 border-pink-500/30 shadow-2xl">
                    <button onclick="document.getElementById('image-preview-container').classList.add('hidden'); selectedImageBase64=null;" class="absolute top-4 right-4 bg-black/60 p-2 rounded-full hover:bg-red-500 transition-colors">✕</button>
                </div>

                <div class="flex justify-between items-center mt-5">
                    <label for="post-image-input" class="group cursor-pointer text-gray-400 hover:text-pink-500 flex items-center gap-2 text-sm font-bold transition-all">
                        <div class="p-2 bg-white/5 rounded-xl group-hover:bg-pink-500/10">🖼️</div>
                        <span>Add Photo</span>
                        <input type="file" id="post-image-input" class="hidden" accept="image/*">
                    </label>
                    <button id="submit-post" class="bg-gradient-to-r from-pink-600 to-purple-600 px-8 py-3 rounded-2xl font-black text-sm hover:scale-105 shadow-[0_10px_20px_rgba(219,39,119,0.3)] transition-all active:scale-95">POST NOW</button>
                </div>
            </div>

            <div id="blog-feed" class="space-y-8 pb-10"></div>
        </main>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
